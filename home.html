<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 5 | home</title>

    <!-- tailwine+daisy -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body>


    <!-- NAVBAR -->

<div class="navbar bg-white shadow px-[5%]">

<div class="flex items-center gap-2 flex-1">
<img class="w-[30px]" src="./assets/github-logo.png">
<h2 class="text-xl font-bold">GitHub Issues Tracker</h2>
</div>

<div class="flex gap-3">

<input id="search-input" type="text"
placeholder="Search issues..."
class="input input-bordered w-60"/>

<button id="search-btn" class="btn btn-primary">
Search
</button>

</div>

</div>



<!-- FILTER BUTTONS -->

<section class="w-[80%] mx-auto my-6 flex gap-3">

<button onclick="loadIssues()" class="btn btn-outline">
All
</button>

<button onclick="filterIssues('open')" class="btn btn-outline">
Open
</button>

<button onclick="filterIssues('closed')" class="btn btn-outline">
Closed
</button>

</section>



<!-- HEADER -->

<section class="w-[80%] mx-auto bg-white p-6 rounded-lg flex justify-between items-center">

<div class="flex items-center gap-4">

<img src="./assets/Aperture.png" class="w-10">

<div>
<h2 id="issue-count" class="text-xl font-bold">Issues</h2>
<p class="text-gray-500">Track and manage your project issues</p>
</div>

</div>

<div class="flex gap-3">
    <h2 class="bg-green-500 px-3 rounded-md">Open</h2>
    <h2 class="bg-purple-500 px-3 rounded-md">Closed</h2>
</div>

</section>



<!-- SPINNER -->

<section id="spinner" class="flex justify-center py-10 ">
  <span class="loading loading-infinity loading-xl"></span>
</section>




<!-- ISSUE CARDS -->

<section id="issues-container"
class="w-[80%] mx-auto my-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
</section>




<!-- ISSUE DETAILS MODAL -->

<dialog id="issue_modal" class="modal">

<div class="modal-box">

<div id="modal-content"></div>

<div class="modal-action">
<form method="dialog">
<button class="btn">Close</button>
</form>
</div>

</div>

</dialog>





    
    
    <script src="./home.js"></script>
</body>

</html>
